name: Check

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/backend/package-lock.json
      - run: npm ci
      - run: node --check server.js
      - run: find routes services controllers utils ../ffmpeg-core -name '*.js' -print0 | xargs -0 -n1 node --check
