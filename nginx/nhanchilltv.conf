server {
    listen 8050;
    server_name _;
    absolute_redirect off;
    merge_slashes off;

    root /opt/nhanchilltv/nginx/html;
    index index.html;

    access_log /var/log/nginx/nhanchilltv.access.log;
    error_log /var/log/nginx/nhanchilltv.error.log warn;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    send_timeout 300s;
    client_max_body_size 12m;

    location / {
        try_files $uri $uri/ /index.html =404;
    }

    location /api/proxy/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_max_temp_file_size 0;
        proxy_socket_keepalive on;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 15s;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /socket.io/ {
        proxy_pass http://127.0.0.1:3000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /rtmp-control {
        allow 127.0.0.1;
        allow ::1;
        deny all;
        rtmp_control all;
    }

    location /event_temp/ {
        alias /opt/nhanchilltv/nginx/temp/event_temp/;
        add_header Cache-Control "public, max-age=31536000";
    }

    location ~ ^/hls/([a-zA-Z0-9_-]+)/([0-9]+)/([^/]+)/(.*)$ {
        set $secure_token $1;
        set $secure_expires $2;
        set $channel_id $3;
        set $hls_file $4;

        secure_link $secure_token,$secure_expires;
        secure_link_md5 "$secure_expires/$channel_id$remote_addr nhanchilltv_super_secret_key_1.4";

        if ($secure_link = "") { return 403; }
        if ($secure_link = "0") { return 410; }

        alias /opt/nhanchilltv/nginx/temp/hls_temp/$channel_id/$hls_file;
        types {
            application/vnd.apple.mpegurl m3u8;
            video/mp2t ts;
            video/iso.segment m4s;
        }
        expires -1;
        add_header Cache-Control no-cache;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range" always;
        add_header Access-Control-Expose-Headers "Content-Length,Content-Range" always;
    }

    location ~ ^/hls/([^/]+)/(.*)$ {
        alias /opt/nhanchilltv/nginx/temp/hls_temp/$1/$2;
        types {
            application/vnd.apple.mpegurl m3u8;
            video/mp2t ts;
            video/iso.segment m4s;
        }
        expires -1;
        add_header Cache-Control no-cache;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range" always;
        add_header Access-Control-Expose-Headers "Content-Length,Content-Range" always;
    }
}
