name: Mirror Vietnam EPG

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/mirror-epg.yml'

permissions:
  contents: write

concurrency:
  group: mirror-vietnam-epg
  cancel-in-progress: true

jobs:
  mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download and validate XMLTV
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --location --retry 3 --retry-delay 5 \
            --connect-timeout 20 --max-time 180 \
            -A 'NhanChillTV EPG Mirror/1.0' \
            https://vnepg.site/epg.xml -o /tmp/epg.xml
          grep -q '<tv' /tmp/epg.xml
          grep -q '<programme' /tmp/epg.xml
          gzip -9 -c /tmp/epg.xml > /tmp/epg.xml.gz

      - name: Publish mirror branch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git checkout --orphan epg-mirror-next
          git rm -rf .
          cp /tmp/epg.xml.gz ./epg.xml.gz
          printf '# NhanChillTV EPG mirror\n\nUpdated hourly by GitHub Actions from vnepg.site.\n' > README.md
          git add epg.xml.gz README.md
          git commit -m "Update EPG mirror $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push --force origin HEAD:epg-mirror
