name: Update EPG Data

on:
  schedule:
    - cron: '0 */6 * * *'  # Run every 6 hours
  workflow_dispatch:      # Allow manual trigger

jobs:
  update-epg:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download EPG Data with Fallback
        run: |
          mkdir -p backend/data
          echo "Attempting to download EPG from vnepg.site..."
          if curl -f -L -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36" -o backend/data/epg.xml.gz https://vnepg.site/epg.xml.gz; then
            echo "Successfully downloaded from vnepg.site"
          else
            echo "vnepg.site blocked or failed. Falling back to epg.pw..."
            if curl -f -L -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64)" -o epg_VN.xml https://epg.pw/xmltv/epg_VN.xml; then
              echo "Successfully downloaded epg_VN.xml from epg.pw. Compressing..."
              gzip -c epg_VN.xml > backend/data/epg.xml.gz
              rm epg_VN.xml
            else
              echo "All EPG sources failed to download in workflow."
              exit 0
            fi
          fi

      - name: Commit and push changes
        run: |
          git config --global user.name "Github Actions"
          git config --global user.email "actions@github.com"
          git add backend/data/epg.xml.gz
          if ! git diff-index --quiet HEAD; then
            git commit -m "chore: auto-update EPG data [skip ci]"
            git push
          else
            echo "No changes in EPG data"
          fi
